kind: DataSource
metadata:
  name: centos-stream-9-httpd-custom
  namespace: openshift-virtualization-os-images
  labels:
    instancetype.kubevirt.io/default-preference: centos.stream9
    app: centos-stream-9-httpd-custom
  annotations:
    cdi.kubevirt.io/storage.bind.immediate.requested: "true"
spec:
  source:
    registry:
      # Update this URL to match your registry
      url: "docker://quay.io/YOUR_USERNAME/centos-stream-9-httpd-custom:latest"
      # If using a private registry, create a pull secret:
      # pullMethod: node
      # secretRef: my-registry-secret
