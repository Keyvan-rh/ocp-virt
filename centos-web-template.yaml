---
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: centos-web-server
  namespace: openshift
  labels:
    template.kubevirt.io/type: base
    template.kubevirt.io/version: v1alpha1
    os.template.kubevirt.io/centos-stream9: "true"
    workload.template.kubevirt.io/server: "true"
    flavor.template.kubevirt.io/large: "true"
  annotations:
    openshift.io/display-name: "CentOS Stream 9 Web Server"
    description: "CentOS Stream 9 with Apache httpd pre-installed (4 vCPU, 16GB RAM)"
    tags: "centos,web,httpd,apache"
    iconClass: "icon-centos"
    openshift.io/provider-display-name: "Red Hat"
    openshift.io/documentation-url: "https://github.com/Keyvan-rh/ocp-virt"
    template.openshift.io/bindable: "false"
    defaults.template.kubevirt.io/disk: rootdisk
    defaults.template.kubevirt.io/network: default
    template.kubevirt.io/editable: |
      /objects[0]/spec/template/spec/domain/cpu/cores
      /objects[0]/spec/template/spec/domain/resources/requests/memory
    template.kubevirt.io/provider: "Red Hat"
    template.kubevirt.io/provider-support-level: "Full"
    template.kubevirt.io/provider-url: "https://github.com/Keyvan-rh/ocp-virt"
    vm.kubevirt.io/validations: |
      [
        {
          "name": "minimal-required-memory",
          "path": "jsonpath::.spec.domain.resources.requests.memory",
          "rule": "integer",
          "message": "This VM requires more memory.",
          "min": 16106127360
        }
      ]
objects:
  - apiVersion: kubevirt.io/v1
    kind: VirtualMachine
    metadata:
      name: ${NAME}
      labels:
        app: ${NAME}
        vm.kubevirt.io/template: centos-web-server
        vm.kubevirt.io/os: centos-stream9
    spec:
      running: true
      template:
        metadata:
          labels:
            kubevirt.io/domain: ${NAME}
            vm.kubevirt.io/name: ${NAME}
        spec:
          domain:
            cpu:
              cores: 4
              sockets: 1
              threads: 1
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
              networkInterfaceMultiqueue: true
              rng: {}
            machine:
              type: pc-q35-rhel9.2.0
            resources:
              requests:
                memory: 16Gi
          networks:
            - name: default
              pod: {}
          terminationGracePeriodSeconds: 180
          volumes:
            - name: rootdisk
              dataVolume:
                name: ${NAME}-rootdisk
            - name: cloudinitdisk
              cloudInitNoCloud:
                userData: |
                  #cloud-config
                  user: centos
                  password: ${CLOUD_USER_PASSWORD}
                  chpasswd:
                    expire: false
                  ssh_pwauth: true
                  runcmd:
                    - systemctl enable --now httpd
                    - systemctl enable --now qemu-guest-agent
      dataVolumeTemplates:
        - metadata:
            name: ${NAME}-rootdisk
          spec:
            sourceRef:
              kind: DataSource
              name: ${DATA_SOURCE_NAME}
              namespace: ${DATA_SOURCE_NAMESPACE}
            storage:
              accessModes:
                - ReadWriteMany
              resources:
                requests:
                  storage: 30Gi
              storageClassName: ${STORAGE_CLASS}
parameters:
  - name: NAME
    description: VM name
    generate: expression
    from: "centos-web-[a-z0-9]{6}"
    required: true
  - name: DATA_SOURCE_NAME
    description: Name of the DataSource to clone
    value: centos-web
    required: true
  - name: DATA_SOURCE_NAMESPACE
    description: Namespace of the DataSource
    value: openshift-virtualization-os-images
    required: true
  - name: STORAGE_CLASS
    description: Storage class for the disk
    value: ocs-storagecluster-ceph-rbd
    required: false
  - name: CLOUD_USER_PASSWORD
    description: Cloud user password
    value: redhat
    required: false
